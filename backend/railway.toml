# Railway config — set service Root Directory to repo root (empty), not backend/.
# In Build settings: Builder = Dockerfile, Dockerfile path = backend/Dockerfile
[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**", "frontend/books_mds/**"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1
